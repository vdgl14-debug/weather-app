<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima USA - ValCusySoft</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .selector-container {
            margin-bottom: 30px;
        }

        .selector-container label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
        }

        .selector-container select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .selector-container select:hover {
            border-color: #764ba2;
        }

        .selector-container select:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .current-weather {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        .city-name {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .temperature {
            font-size: 60px;
            font-weight: bold;
            margin: 10px 0;
        }

        .description {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 20px;
            text-transform: capitalize;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .detail-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .detail-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 20px;
            font-weight: bold;
        }

        .forecast {
            margin-top: 30px;
        }

        .forecast h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .forecast-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .forecast-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
            transform: translateY(-5px);
        }

        .forecast-date {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .forecast-icon {
            font-size: 40px;
            margin: 10px 0;
        }

        .forecast-temp {
            color: #333;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .forecast-details {
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 18px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .temp-toggle {
            display: flex;
            gap: 10px;
            background: #f0f0f0;
            padding: 5px;
            border-radius: 8px;
        }

        .temp-toggle button {
            padding: 8px 16px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .temp-toggle button.active {
            background: #667eea;
            color: white;
        }

        .temp-toggle button:hover:not(.active) {
            background: #e0e0e0;
        }

        .btn-back {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-back:hover {
            background: #764ba2;
            transform: translateX(-3px);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .temperature {
                font-size: 45px;
            }

            .city-name {
                font-size: 24px;
            }

            .weather-details {
                grid-template-columns: repeat(2, 1fr);
            }

            .forecast-grid {
                grid-template-columns: 1fr;
            }

            .header-controls {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ Clima USA</h1>
            <p>Pronóstico de 5 días para todos los estados</p>
        </div>

        <div class="header-controls" id="headerControls" style="display: none;">
            <button class="btn-back" id="btnBack">← Volver</button>
            <div class="temp-toggle">
                <button class="active" data-unit="fahrenheit">°F</button>
                <button data-unit="celsius">°C</button>
            </div>
        </div>

        <div class="selector-container" id="selectorContainer">
            <label for="stateSelect">Selecciona un estado:</label>
            <select id="stateSelect">
                <option value="">-- Elige un estado --</option>
            </select>
        </div>

        <div id="errorContainer"></div>
        <div id="weatherContainer"></div>
    </div>

    <script>
        // Lista de estados USA con sus ciudades principales y coordenadas
        const states = [
            { name: 'Alabama', city: 'Montgomery', lat: 32.3792, lon: -86.3077 },
            { name: 'Alaska', city: 'Juneau', lat: 58.3019, lon: -134.4197 },
            { name: 'Arizona', city: 'Phoenix', lat: 33.4484, lon: -112.0742 },
            { name: 'Arkansas', city: 'Little Rock', lat: 34.7465, lon: -92.2896 },
            { name: 'California', city: 'Los Angeles', lat: 34.0522, lon: -118.2437 },
            { name: 'Colorado', city: 'Denver', lat: 39.7392, lon: -104.9903 },
            { name: 'Connecticut', city: 'Hartford', lat: 41.7658, lon: -72.6734 },
            { name: 'Delaware', city: 'Wilmington', lat: 39.7391, lon: -75.5244 },
            { name: 'Florida', city: 'Miami', lat: 25.7617, lon: -80.1918 },
            { name: 'Georgia', city: 'Atlanta', lat: 33.7490, lon: -84.3880 },
            { name: 'Hawaii', city: 'Honolulu', lat: 21.3099, lon: -157.8581 },
            { name: 'Idaho', city: 'Boise', lat: 43.6150, lon: -116.2023 },
            { name: 'Illinois', city: 'Chicago', lat: 41.8781, lon: -87.6298 },
            { name: 'Indiana', city: 'Indianapolis', lat: 39.7684, lon: -86.1581 },
            { name: 'Iowa', city: 'Des Moines', lat: 41.5868, lon: -93.6250 },
            { name: 'Kansas', city: 'Topeka', lat: 39.0473, lon: -95.6752 },
            { name: 'Kentucky', city: 'Louisville', lat: 38.2527, lon: -85.7585 },
            { name: 'Louisiana', city: 'New Orleans', lat: 29.9511, lon: -90.2623 },
            { name: 'Maine', city: 'Portland', lat: 43.6591, lon: -70.2568 },
            { name: 'Maryland', city: 'Baltimore', lat: 39.2904, lon: -76.6122 },
            { name: 'Massachusetts', city: 'Boston', lat: 42.3601, lon: -71.0589 },
            { name: 'Michigan', city: 'Detroit', lat: 42.3314, lon: -83.0458 },
            { name: 'Minnesota', city: 'Minneapolis', lat: 44.9778, lon: -93.2650 },
            { name: 'Mississippi', city: 'Jackson', lat: 32.2988, lon: -90.1848 },
            { name: 'Missouri', city: 'Kansas City', lat: 39.0997, lon: -94.5786 },
            { name: 'Montana', city: 'Billings', lat: 45.7833, lon: -103.9964 },
            { name: 'Nebraska', city: 'Omaha', lat: 41.2565, lon: -95.9345 },
            { name: 'Nevada', city: 'Las Vegas', lat: 36.1699, lon: -115.1398 },
            { name: 'New Hampshire', city: 'Manchester', lat: 42.9956, lon: -71.4548 },
            { name: 'New Jersey', city: 'Newark', lat: 40.7357, lon: -74.1724 },
            { name: 'New Mexico', city: 'Albuquerque', lat: 35.0844, lon: -106.6504 },
            { name: 'New York', city: 'New York City', lat: 40.7128, lon: -74.0060 },
            { name: 'North Carolina', city: 'Charlotte', lat: 35.2271, lon: -80.8431 },
            { name: 'North Dakota', city: 'Bismarck', lat: 46.8083, lon: -100.7837 },
            { name: 'Ohio', city: 'Columbus', lat: 39.9612, lon: -82.9988 },
            { name: 'Oklahoma', city: 'Oklahoma City', lat: 35.4676, lon: -97.5164 },
            { name: 'Oregon', city: 'Portland', lat: 45.5152, lon: -122.6784 },
            { name: 'Pennsylvania', city: 'Philadelphia', lat: 39.9526, lon: -75.1652 },
            { name: 'Rhode Island', city: 'Providence', lat: 41.8240, lon: -71.4128 },
            { name: 'South Carolina', city: 'Charleston', lat: 32.7765, lon: -79.9626 },
            { name: 'South Dakota', city: 'Sioux Falls', lat: 43.5460, lon: -96.7313 },
            { name: 'Tennessee', city: 'Nashville', lat: 36.1627, lon: -86.7816 },
            { name: 'Texas', city: 'Houston', lat: 29.7604, lon: -95.3698 },
            { name: 'Utah', city: 'Salt Lake City', lat: 40.7608, lon: -111.8910 },
            { name: 'Vermont', city: 'Burlington', lat: 44.4759, lon: -73.2121 },
            { name: 'Virginia', city: 'Richmond', lat: 37.5407, lon: -77.4360 },
            { name: 'Washington', city: 'Seattle', lat: 47.6062, lon: -122.3321 },
            { name: 'West Virginia', city: 'Charleston', lat: 38.3498, lon: -81.6326 },
            { name: 'Wisconsin', city: 'Milwaukee', lat: 43.0389, lon: -87.9065 },
            { name: 'Wyoming', city: 'Cheyenne', lat: 41.1400, lon: -104.8202 }
        ];

        // Variables globales
        let currentUnit = 'fahrenheit';
        let currentData = null;
        let currentStateName = '';
        let currentCityName = '';

        // Convertir temperatura
        function convertTemp(fahrenheit) {
            if (currentUnit === 'celsius') {
                return Math.round((fahrenheit - 32) * 5/9);
            }
            return Math.round(fahrenheit);
        }

        // Obtener símbolo de temperatura
        function getTempSymbol() {
            return currentUnit === 'celsius' ? '°C' : '°F';
        }

        // Llenar el selector
        function fillStateSelector() {
            const select = document.getElementById('stateSelect');
            states.forEach(state => {
                const option = document.createElement('option');
                option.value = JSON.stringify({ lat: state.lat, lon: state.lon, name: state.name, city: state.city });
                option.textContent = `${state.name} (${state.city})`;
                select.appendChild(option);
            });
        }

        // Obtener el clima
        async function getWeather(lat, lon, stateName, cityName) {
            const container = document.getElementById('weatherContainer');
            const errorContainer = document.getElementById('errorContainer');
            
            container.innerHTML = '<div class="loading">Cargando clima...</div>';
            errorContainer.innerHTML = '';
            document.getElementById('headerControls').style.display = 'flex';
            document.getElementById('selectorContainer').style.display = 'none';

            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,relative_humidity_2m_max,apparent_temperature_max,apparent_temperature_min,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto`
                );

                if (!response.ok) throw new Error('Error fetching weather data');
                
                const data = await response.json();
                currentData = data;
                currentStateName = stateName;
                currentCityName = cityName;
                displayWeather(data, stateName, cityName);
            } catch (error) {
                errorContainer.innerHTML = `<div class="error">❌ Error al cargar el clima. Intenta de nuevo.</div>`;
                container.innerHTML = '';
                document.getElementById('headerControls').style.display = 'none';
                console.error('Error:', error);
            }
        }

        // Mostrar el clima
        function displayWeather(data, stateName, cityName) {
            const container = document.getElementById('weatherContainer');
            const daily = data.daily;
            const timezone = data.timezone;

            // Clima actual (primer día)
            const today = new Date(daily.time[0]);
            const currentTemp = daily.temperature_2m_max[0];
            const minTemp = daily.temperature_2m_min[0];
            const humidity = daily.relative_humidity_2m_max[0];
            const windSpeed = daily.windspeed_10m_max[0];
            const apparentTemp = daily.apparent_temperature_max[0];

            const weatherDescription = getWeatherDescription(daily.weather_code[0]);
            const weatherIcon = getWeatherIcon(daily.weather_code[0]);

            let html = `
                <div class="current-weather">
                    <div class="city-name">${stateName}</div>
                    <div style="font-size: 14px; opacity: 0.9; margin-bottom: 10px;">${cityName}</div>
                    <div class="temperature">${convertTemp(currentTemp)}${getTempSymbol()}</div>
                    <div class="description">${weatherIcon} ${weatherDescription}</div>
                    
                    <div class="weather-details">
                        <div class="detail-box">
                            <div class="detail-label">Sensación Térmica</div>
                            <div class="detail-value">${convertTemp(apparentTemp)}${getTempSymbol()}</div>
                        </div>
                        <div class="detail-box">
                            <div class="detail-label">Humedad</div>
                            <div class="detail-value">${humidity}%</div>
                        </div>
                        <div class="detail-box">
                            <div class="detail-label">Viento</div>
                            <div class="detail-value">${Math.round(windSpeed)} mph</div>
                        </div>
                        <div class="detail-box">
                            <div class="detail-label">Mín. Hoy</div>
                            <div class="detail-value">${convertTemp(minTemp)}${getTempSymbol()}</div>
                        </div>
                    </div>
                </div>

                <div class="forecast">
                    <h3>Pronóstico de 5 Días</h3>
                    <div class="forecast-grid">
            `;

            // Pronóstico de 5 días
            for (let i = 0; i < 5; i++) {
                const date = new Date(daily.time[i]);
                const dayName = date.toLocaleDateString('es-ES', { weekday: 'short' });
                const dayDate = date.toLocaleDateString('es-ES', { month: 'short', day: 'numeric' });
                
                const high = daily.temperature_2m_max[i];
                const low = daily.temperature_2m_min[i];
                const humidity = daily.relative_humidity_2m_max[i];
                const windSpeed = daily.windspeed_10m_max[i];
                const weatherCode = daily.weather_code[i];
                const description = getWeatherDescription(weatherCode);
                const icon = getWeatherIcon(weatherCode);

                html += `
                    <div class="forecast-card">
                        <div class="forecast-date">${dayName}, ${dayDate}</div>
                        <div class="forecast-icon">${icon}</div>
                        <div class="forecast-temp">${convertTemp(high)}° / ${convertTemp(low)}°${getTempSymbol()}</div>
                        <div class="forecast-details">
                            <div>💧 ${humidity}%</div>
                            <div>💨 ${Math.round(windSpeed)} mph</div>
                        </div>
                    </div>
                `;
            }

            html += `
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        // Describir el código del clima
        function getWeatherDescription(code) {
            const codeMap = {
                0: 'Despejado',
                1: 'Principalmente despejado',
                2: 'Parcialmente nublado',
                3: 'Nublado',
                45: 'Niebla',
                48: 'Niebla helada',
                51: 'Llovizna ligera',
                53: 'Llovizna moderada',
                55: 'Llovizna densa',
                61: 'Lluvia ligera',
                63: 'Lluvia moderada',
                65: 'Lluvia fuerte',
                71: 'Nieve ligera',
                73: 'Nieve moderada',
                75: 'Nieve fuerte',
                77: 'Granos de nieve',
                80: 'Aguaceros ligeros',
                81: 'Aguaceros moderados',
                82: 'Aguaceros fuertes',
                85: 'Nieve ligera con lluvia',
                86: 'Nieve fuerte con lluvia',
                95: 'Tormenta eléctrica',
                96: 'Tormenta con granizo ligero',
                99: 'Tormenta con granizo fuerte'
            };
            return codeMap[code] || 'Desconocido';
        }

        // Obtener emoji del clima
        function getWeatherIcon(code) {
            if (code === 0) return '☀️';
            if ([1, 2].includes(code)) return '⛅';
            if (code === 3) return '☁️';
            if ([45, 48].includes(code)) return '🌫️';
            if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) return '🌧️';
            if ([71, 73, 75, 77, 85, 86].includes(code)) return '❄️';
            if ([95, 96, 99].includes(code)) return '⛈️';
            return '🌤️';
        }

        // Volver a la vista principal
        function goBack() {
            document.getElementById('selectorContainer').style.display = 'block';
            document.getElementById('headerControls').style.display = 'none';
            document.getElementById('weatherContainer').innerHTML = '';
            document.getElementById('errorContainer').innerHTML = '';
            document.getElementById('stateSelect').value = '';
            currentData = null;
        }

        // Event listener para cambiar de unidad de temperatura
        document.querySelectorAll('.temp-toggle button').forEach(button => {
            button.addEventListener('click', (e) => {
                document.querySelectorAll('.temp-toggle button').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentUnit = e.target.dataset.unit;
                
                // Re-mostrar el clima con la nueva unidad
                if (currentData) {
                    displayWeather(currentData, currentStateName, currentCityName);
                }
            });
        });

        // Event listener para el botón de volver
        document.getElementById('btnBack').addEventListener('click', goBack);

        // Event listener para el selector
        document.getElementById('stateSelect').addEventListener('change', (e) => {
            if (e.target.value) {
                const data = JSON.parse(e.target.value);
                getWeather(data.lat, data.lon, data.name, data.city);
            }
        });

        // Llenar el selector al cargar
        fillStateSelector();
    </script>
</body>
</html>
